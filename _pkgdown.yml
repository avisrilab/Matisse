url: https://avisrilab.github.io/Matisse

template:
  bootstrap: 5
  bootswatch: flatly
  bslib:
    primary: "#2C6E8A"
    heading-font: "Lato"
    base-font-size: "1rem"
    container-max-width: "100%"

home:
  title: "Matisse — Splicing and chromatin, one cell at a time"
  description: >
    Matisse adds isoform-resolved splicing and chromatin accessibility
    layers to your Seurat/Signac workflow. For each cell, measure which
    transcript isoform is being made and compare that directly with
    chromatin accessibility at the same loci — all within one object,
    on the same UMAP, across the same clusters.
    Works with 10x Chromium (STARsolo junction counts), long-read
    isoform data (Bagpiper, FLAMES, LIQA), and 10x Multiome / Signac
    for paired ATAC + RNA.
  links:
    - text: GitHub repository
      href: https://github.com/avisrilab/Matisse
    - text: Report an issue
      href: https://github.com/avisrilab/Matisse/issues

navbar:
  structure:
    left:  [intro, install, getting-started, articles, reference, news]
    right: [search, github]
  components:
    install:
      text: Install
      href: index.html#installation
    getting-started:
      text: Getting Started
      href: articles/intro.html
    articles:
      text: Vignettes
      menu:
        - text: Long-read workflow (transcript counts)
          href: articles/long-reads.html
        - text: Short-read workflow (junction counts)
          href: articles/short-reads.html
    github:
      icon: fab fa-github fa-lg
      href: https://github.com/avisrilab/Matisse
      aria-label: GitHub

reference:
  - title: "Creating a Matisse object"
    desc: >
      Start here. This function combines your Seurat object with splicing
      data into a single Matisse object ready for analysis. Pass
      <code>junction_counts</code> for short-read (junction) mode, or
      <code>transcript_counts</code> + <code>ioe_files</code> for long-read
      (event) mode.
    contents:
      - MatisseObject-class
      - CreateMatisseObject

  - title: "Retrieve or update your data"
    desc: >
      Functions for pulling specific data tables out of your Matisse object,
      or putting updated tables back in.
    contents:
      - GetSeurat
      - GetPSI
      - SetPSI
      - GetJunctionCounts
      - GetInclusionCounts
      - GetExclusionCounts
      - GetTranscriptCounts
      - GetEventData
      - GetJunctionData
      - MatisseMeta
      - "MatisseMeta<-"
      - AddIsoformMetadata

  - title: "Normalisation"
    desc: >
      Normalise count data before clustering. <code>SCTransform</code> applies
      variance stabilisation and scales for sequencing depth — in event mode
      it targets the <code>transcript</code> assay automatically; in junction
      mode it targets the gene-expression assay. <code>NormalizeData</code>,
      <code>ScaleData</code>, and <code>FindVariableFeatures</code> are
      log-normalisation alternatives.
    contents:
      - SCTransform.MatisseObject
      - NormalizeData.MatisseObject
      - ScaleData.MatisseObject
      - FindVariableFeatures.MatisseObject

  - title: "Dimensionality reduction"
    desc: >
      Reduce the high-dimensional feature space to a compact representation
      before clustering and visualisation. <code>RunPCA</code> is the standard
      route after <code>SCTransform</code>; <code>RunSVD</code> (LSI) is used
      for ATAC-seq data in multiome experiments.
    contents:
      - RunPCA.MatisseObject
      - RunUMAP.MatisseObject
      - RunTSNE.MatisseObject

  - title: "Clustering and differential expression"
    desc: >
      Group cells by transcriptional state and identify marker genes.
      All functions operate on the embedded Seurat object and return the
      updated <code>MatisseObject</code> — except <code>FindMarkers</code>,
      which returns a data frame.
    contents:
      - FindNeighbors.MatisseObject
      - FindClusters.MatisseObject
      - FindMarkers.MatisseObject

  - title: "Metadata"
    desc: >
      Add or update per-cell metadata columns. New columns are accessible
      immediately via <code>MatisseMeta()</code> and the <code>$</code> operator.
    contents:
      - AddMetaData.MatisseObject

  - title: "Signac / ATAC-seq methods"
    desc: >
      For multiome (paired ATAC + RNA) datasets. <code>RunTFIDF</code>
      normalises peak counts; <code>FindTopFeatures</code> selects variable
      peaks; <code>RunSVD</code> performs Latent Semantic Indexing (LSI) —
      the ATAC equivalent of PCA.
    contents:
      - RunTFIDF.MatisseObject
      - FindTopFeatures.MatisseObject
      - RunSVD.MatisseObject

  - title: "Calculate splicing ratios (PSI)"
    desc: >
      Compute PSI (Percent Spliced In) — the fraction of transcripts in each
      cell that include a given exon. Values range from 0 (exon always skipped)
      to 1 (exon always included). In event mode this is done at construction;
      in junction mode call CalculatePSI() explicitly.
    contents:
      - CalculatePSI
      - SummarizePSI

  - title: "Quality control and filtering"
    desc: >
      Identify and remove cells or splicing events that don't have enough
      data for reliable analysis.
    contents:
      - ComputeIsoformQC
      - FilterCells
      - FilterEvents

  - title: "Visualisation"
    desc: >
      Plot splicing patterns across your cells. Overlay any feature — PSI
      values, junction counts, or gene expression — on a UMAP, compare
      splicing between cell types, or inspect junction usage for a gene
      of interest. Pass the feature name via the <code>feature</code>
      argument.
    contents:
      - PlotUMAP
      - PlotViolin
      - PlotHeatmap
      - PlotCoverage
      - PlotSashimi
      - PlotQCMetrics

  - title: "Utilities"
    desc: >
      Helper functions for building event tables and combining datasets.
    contents:
      - BuildSimpleEvents
      - MergeMatisse

articles:
  - title: "Vignettes"
    navbar: "Vignettes"
    contents:
      - intro
      - long-reads
      - short-reads

news:
  - one_page: true
