url: https://avisrilab.github.io/Matisse

template:
  bootstrap: 5
  bootswatch: flatly
  bslib:
    primary: "#2C6E8A"
    heading-font: "Lato"
    base-font-size: "1rem"
    container-max-width: "100%"

home:
  title: "Matisse — Splicing and chromatin, one cell at a time"
  description: >
    Matisse adds isoform-resolved splicing and chromatin accessibility
    layers to your Seurat/Signac workflow. For each cell, measure which
    transcript isoform is being made and compare that directly with
    chromatin accessibility at the same loci — all within one object,
    on the same UMAP, across the same clusters.
    Works with 10x Chromium (STARsolo junction counts), long-read
    isoform data (Bagpiper, FLAMES, LIQA), and 10x Multiome / Signac
    for paired ATAC + RNA.
  links:
    - text: GitHub repository
      href: https://github.com/avisrilab/Matisse
    - text: Report an issue
      href: https://github.com/avisrilab/Matisse/issues

navbar:
  structure:
    left:  [intro, install, getting-started, articles, reference, news]
    right: [search, github]
  components:
    install:
      text: Install
      href: index.html#installation
    getting-started:
      text: Getting Started
      href: articles/intro.html
    articles:
      text: Vignettes
      menu:
        - text: Short-read workflow (junction counts)
          href: articles/short-reads.html
        - text: Long-read workflow (transcript counts)
          href: articles/long-reads.html
    github:
      icon: fab fa-github fa-lg
      href: https://github.com/avisrilab/Matisse
      aria-label: GitHub

reference:
  - title: "Creating a Matisse object"
    desc: >
      Start here. These functions combine your Seurat object with splicing
      data into a single Matisse object ready for analysis. Use
      `CreateMatisseObject()` if you have junction counts from STAR/STARsolo,
      or `CreateMatisseObjectFromTranscripts()` if you have isoform-level
      counts from Bagpiper or a long-read quantifier.
    contents:
      - MatisseObject-class
      - CreateMatisseObject
      - CreateMatisseObjectFromTranscripts

  - title: "Retrieve or update your data"
    desc: >
      Functions for pulling specific data tables out of your Matisse object,
      or putting updated tables back in.
    contents:
      - GetSeurat
      - GetPSI
      - SetPSI
      - GetJunctionCounts
      - GetInclusionCounts
      - GetExclusionCounts
      - GetTranscriptCounts
      - GetEventData
      - GetJunctionData
      - MatisseMeta
      - "MatisseMeta<-"
      - AddIsoformMetadata

  - title: "Normalisation"
    desc: >
      Normalise transcript-level count data before clustering. These functions
      wrap standard Seurat normalisation steps and tune them for isoform data.
    contents:
      - SCTransformTranscripts

  - title: "Calculate splicing ratios (PSI)"
    desc: >
      Compute PSI (Percent Spliced In) — the fraction of transcripts in each
      cell that include a given exon. Values range from 0 (exon always skipped)
      to 1 (exon always included).
    contents:
      - CalculatePSI
      - SummarizePSI

  - title: "Quality control and filtering"
    desc: >
      Identify and remove cells or splicing events that don't have enough
      data for reliable analysis.
    contents:
      - ComputeIsoformQC
      - FilterCells
      - FilterEvents

  - title: "Visualisation"
    desc: >
      Plot splicing patterns across your cells. Overlay PSI values on a UMAP,
      compare splicing between cell types, or inspect junction usage for a
      gene of interest.
    contents:
      - PlotPSIUMAP
      - PlotPSIViolin
      - PlotPSIHeatmap
      - PlotJunctionCoverage
      - PlotQCMetrics

  - title: "Utilities"
    desc: >
      Helper functions for building event tables and combining datasets.
    contents:
      - BuildSimpleEvents
      - MergeMatisse

articles:
  - title: "Vignettes"
    navbar: "Vignettes"
    contents:
      - intro
      - short-reads
      - long-reads

news:
  - one_page: true
